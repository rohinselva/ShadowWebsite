      projectId: "shadow-wheelchair",
      storageBucket: "shadow-wheelchair.firebasestorage.app",
      messagingSenderId: "173181720373",
      appId: "1:173181720373:web:59c0c33549506b67511e7c",
      measurementId: "G-QJFT085PWR"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window._firebaseAuth = auth;
    window._firebaseDb = db;
