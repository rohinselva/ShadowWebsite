<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadow Wheelchairs & Seating | Chennai</title>
  <meta name="description"
    content="Shadow Wheelchairs & Seating – Chennai's trusted provider of custom wheelchairs, postural seating, hospice care products and rental mobility aids. Empowering independence since day one." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ===== TOP BAR ===== -->
  <div class="topbar">
    <div class="topbar-inner">
      <span>📍 36, Professor Sanjeevi St, Mylapore, Chennai – 600004</span>
      <div class="topbar-right">
        <a href="tel:+919445610803">📞 +91 94456 10803</a>
        <a href="mailto:johnson.shadowwheelchairs@outlook.com">✉ johnson.shadowwheelchairs@outlook.com</a>
      </div>
    </div>
  </div>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="main-nav">
    <div class="nav-inner">
      <!-- Logo -->
      <a href="#home" class="nav-logo" onclick="router.go('home')">
        <div class="logo-img-wrap">
          <img src="assets/logo.png" alt="Shadow Wheelchairs Logo" class="main-logo">
        </div>
        <div class="logo-text">
          <span class="logo-main">SHADOW</span>
          <span class="logo-sub">WHEELCHAIRS & SEATING</span>
        </div>
      </a>

      <!-- Nav Links -->
      <ul class="nav-links" id="nav-links">
        <li><a href="#home" onclick="router.go('home')">Home</a></li>
        <li class="has-dropdown">
          <a href="#shop" onclick="router.go('shop')">Products ▾</a>
          <ul class="dropdown">
            <li><a href="#shop" onclick="router.goShop('electric')">Electric Wheelchairs</a></li>
            <li><a href="#shop" onclick="router.goShop('manual')">Manual Wheelchairs</a></li>
            <li><a href="#shop" onclick="router.goShop('custom')">Custom Seating</a></li>
          </ul>
        </li>
        <li><a href="#about" onclick="router.go('about')">About Us</a></li>
        <li><a href="#contact" onclick="router.go('contact')">Contact</a></li>
      </ul>

      <!-- Actions -->
      <div class="nav-actions">
        <button class="icon-action" id="search-btn" onclick="UI.toggleSearch()" title="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
        </button>
        <button class="icon-action" id="wishlist-btn" onclick="State.userTab='wishlist'; router.go('user')"
          title="Wishlist">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
          </svg>
          <span class="badge" id="wishlist-count">0</span>
        </button>
        <button class="icon-action cart-action" id="cart-btn" onclick="UI.openCart()" title="Cart">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
          <span class="badge cart-badge" id="cart-count">0</span>
        </button>
        <button class="icon-action" id="user-btn" onclick="State.userTab='orders'; router.go('user')"
          title="My Account">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </button>

        <button class="hamburger" id="hamburger" onclick="UI.toggleMenu()" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="search-bar" id="search-bar">
      <div class="search-inner">
        <input type="text" id="search-input" placeholder="Search wheelchairs, accessories..."
          oninput="Search.run(this.value)" autocomplete="off" />
        <button onclick="UI.toggleSearch()">✕</button>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>
  </nav>

  <!-- ===== MAIN CONTENT (SPA) ===== -->
  <main id="main-content"></main>

  <!-- ===== CART DRAWER ===== -->
  <div class="drawer-overlay" id="cart-overlay" onclick="UI.closeCart()"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="drawer-head">
      <h3>Your Cart</h3>
      <button class="close-drawer" onclick="UI.closeCart()">✕</button>
    </div>
    <div class="drawer-body" id="cart-body"></div>
    <div class="drawer-foot" id="cart-foot"></div>
  </aside>

  <!-- ===== MODAL ===== -->
  <div class="modal-overlay" id="modal-overlay" onclick="UI.closeModal()"></div>
  <div class="modal" id="main-modal">
    <button class="modal-close" onclick="UI.closeModal()">✕</button>
    <div class="modal-body" id="modal-body"></div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <footer id="site-footer"></footer>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, onSnapshot, query, where, serverTimestamp, doc, getDoc, updateDoc, setDoc }
      from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyBJ40D9p6kDYppYwiF5umgsOoFORJrDIt0",
      authDomain: "shadow-wheelchair.firebaseapp.com",
      projectId: "shadow-wheelchair",
      storageBucket: "shadow-wheelchair.firebasestorage.app",
      messagingSenderId: "173181720373",
      appId: "1:173181720373:web:59c0c33549506b67511e7c",
      measurementId: "G-QJFT085PWR"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window._firebaseAuth = auth;
    window._firebaseDb = db;
    window._firebaseFirestore = { collection, addDoc, getDocs, onSnapshot, query, where, serverTimestamp, doc, getDoc, updateDoc, setDoc };
    window._firebaseSignIn = signInWithEmailAndPassword;
    window._firebaseCreateUser = createUserWithEmailAndPassword;
    window._firebaseSignOut = signOut;
    window._firebaseAuthReady = onAuthStateChanged;

    // EMERGENCY ROUTE FILTER: Detect admin attempts before app.js even loads
    const hash = window.location.hash;
    if (hash === '#admin-login' || hash === '#admin') {
      console.log("Secret Route Detected: Locking UI...");
      document.body.style.opacity = '0.5'; // Visual feedback that it's working
      window._is_secret_route = true;
    }
  </script>
  <script src="app.js?v=hours_update_v3" type="module"></script>
</body>

</html>
